<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shotgun — You're In!</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#13131a;border:1px solid rgba(233,69,96,.2);border-radius:24px;padding:48px 40px;text-align:center;max-width:400px;width:90%;}
.icon{font-size:64px;margin-bottom:20px;}
h1{font-size:28px;font-weight:900;margin-bottom:8px;}
p{color:#64748b;font-size:14px;line-height:1.6;margin-bottom:24px;}
.btn{display:inline-block;background:linear-gradient(135deg,#e94560,#c0392b);color:#fff;padding:14px 32px;border-radius:12px;font-weight:800;text-decoration:none;font-size:14px;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎯</div>
  <h1>Gottem! You're live.</h1>
  <p>Your Shotgun account is fully set up and connected to Stripe. You can now deposit, send, and receive money.</p>
  <a href="/" class="btn">Open Shotgun →</a>
</div>
</body>
</html>
