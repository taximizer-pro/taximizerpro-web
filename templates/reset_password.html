<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — TaximizerPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); backdrop-filter:blur(20px); border-radius:24px; padding:40px 36px; width:100%; max-width:420px; }
    input { width:100%; padding:12px 16px; background:rgba(255,255,255,.07); border:1.5px solid rgba(255,255,255,.12); border-radius:10px; color:#f8fafc; font-size:14px; outline:none; font-family:'Inter',sans-serif; margin-bottom:16px; }
    input:focus { border-color:#22c55e; box-shadow:0 0 0 3px rgba(34,197,94,.15); }
    .btn { width:100%; padding:14px; border-radius:12px; font-size:15px; font-weight:800; border:none; cursor:pointer; background:linear-gradient(135deg,#22c55e,#16a34a); color:#fff; }
    .label { font-size:11px; font-weight:700; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:8px; }
    .error { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); border-radius:10px; padding:12px 16px; color:#fca5a5; font-size:13px; margin-bottom:16px; }
    #strength { height:4px; border-radius:2px; margin-bottom:12px; transition:all .3s; background:#ef4444; width:0%; }
  </style>
</head>
<body>
<div class="card">
  <div style="text-align:center;margin-bottom:28px;">
    <div style="width:52px;height:52px;background:linear-gradient(135deg,#064e3b,#0f172a);border:2px solid rgba(34,197,94,.4);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;">🔒</div>
    <div style="font-size:22px;font-weight:900;color:#f8fafc;">Set new password</div>
    <div style="font-size:13px;color:rgba(255,255,255,.4);margin-top:4px;">Choose something strong</div>
  </div>

  {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}

  <form method="POST">
    <label class="label">New Password</label>
    <input type="password" name="password" id="pw1" placeholder="Min 8 characters" required oninput="checkStrength(this.value)">
    <div style="background:rgba(255,255,255,.08);border-radius:4px;height:4px;margin-bottom:12px;overflow:hidden;"><div id="strength"></div></div>
    <label class="label">Confirm Password</label>
    <input type="password" name="confirm" placeholder="Repeat your password" required>
    <button type="submit" class="btn">Update Password →</button>
  </form>
</div>
<script>
function checkStrength(v) {
  const bar = document.getElementById('strength');
  let score = 0;
  if (v.length >= 8) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const colors = ['#ef4444','#f59e0b','#3b82f6','#22c55e'];
  bar.style.width = (score*25)+'%';
  bar.style.background = colors[score-1]||'#ef4444';
}
</script>
</body>
</html>
