{% extends "base.html" %}
{% block title %}Prospects — TaximizerPro{% endblock %}
{% block content %}
<div style="padding:28px 32px;">

  <!-- Header -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
    <div>
      <h1 style="font-size:22px;font-weight:800;color:#0f172a;margin:0;">Prospects</h1>
      <p style="color:#64748b;font-size:13px;margin-top:4px;">Partial entries waiting to be completed and submitted.</p>
    </div>
    <a href="/new-client?mode=prospect" class="btn-primary" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;">
      <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
      Add Prospect
    </a>
  </div>

  <!-- Search -->
  <div style="margin-bottom:18px;">
    <input id="search" class="input-field" style="max-width:320px;" placeholder="🔍 Search by name or email…" oninput="filterList()">
  </div>

  <!-- Table -->
  <div class="card" style="overflow:hidden;">
    <table style="width:100%;border-collapse:collapse;" id="prospect-table">
      <thead>
        <tr style="background:#f8fafc;border-bottom:1px solid #f1f5f9;">
          <th style="padding:11px 16px;text-align:left;font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Name</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Email</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Phone</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Years</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Added</th>
          <th style="padding:11px 16px;text-align:left;font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Completeness</th>
          <th style="padding:11px 16px;text-align:right;font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Action</th>
        </tr>
      </thead>
      <tbody id="prospect-body">
        <tr><td colspan="7" style="padding:40px;text-align:center;color:#94a3b8;font-size:13px;">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let ALL = [];

function completeness(p) {
  const fields = ['first_name','last_name','ssn','email','address','city','state','zip','bank_routing','bank_account','tax_year'];
  const filled = fields.filter(f => p[f] && String(p[f]).trim()).length;
  return Math.round((filled / fields.length) * 100);
}

function bar(pct) {
  const color = pct < 40 ? '#ef4444' : pct < 80 ? '#f59e0b' : '#22c55e';
  return `<div style="display:flex;align-items:center;gap:8px;">
    <div style="flex:1;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;min-width:80px;">
      <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;"></div>
    </div>
    <span style="font-size:11px;font-weight:600;color:${color};min-width:28px;">${pct}%</span>
  </div>`;
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function renderTable(data) {
  const tbody = document.getElementById('prospect-body');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="padding:40px;text-align:center;color:#94a3b8;font-size:13px;">No prospects yet. <a href="/new-client?mode=prospect" style="color:#f59e0b;font-weight:600;">Add one →</a></td></tr>';
    return;
  }
  tbody.innerHTML = data.map(p => {
    const pct = completeness(p);
    const name = (p.full_name || ((p.first_name||'') + ' ' + (p.last_name||'')).trim() || '—');
    return `<tr style="border-bottom:1px solid #f8fafc;" class="prospect-row" data-search="${(name+' '+(p.email||'')).toLowerCase()}">
      <td style="padding:13px 16px;">
        <div style="font-weight:600;font-size:13px;color:#0f172a;">${name}</div>
        ${p.ssn ? '<div style="font-size:11px;color:#94a3b8;margin-top:2px;">SSN on file</div>' : '<div style="font-size:11px;color:#ef4444;margin-top:2px;">No SSN</div>'}
      </td>
      <td style="padding:13px 16px;font-size:12px;color:#475569;">${p.email || '<span style="color:#cbd5e1;">—</span>'}</td>
      <td style="padding:13px 16px;font-size:12px;color:#475569;">${p.phone || '<span style="color:#cbd5e1;">—</span>'}</td>
      <td style="padding:13px 16px;">
        ${(p.tax_year||'').split(',').filter(Boolean).map(y => `<span style="display:inline-block;background:#fef3c7;color:#92400e;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:700;margin-right:3px;">${y.trim()}</span>`).join('')||'<span style="color:#cbd5e1;font-size:12px;">—</span>'}
      </td>
      <td style="padding:13px 16px;font-size:12px;color:#64748b;">${formatDate(p.created_date)}</td>
      <td style="padding:13px 16px;">${bar(pct)}</td>
      <td style="padding:13px 16px;text-align:right;">
        <a href="/prospect/${p.id}" style="display:inline-flex;align-items:center;gap:5px;background:#f59e0b;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;">
          <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          Edit
        </a>
      </td>
    </tr>`;
  }).join('');
}

function filterList() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = q ? ALL.filter(p => {
    const s = ((p.full_name||'') + ' ' + (p.first_name||'') + ' ' + (p.last_name||'') + ' ' + (p.email||'')).toLowerCase();
    return s.includes(q);
  }) : ALL;
  renderTable(filtered);
}

async function load() {
  try {
    const res = await fetch('/api/prospects');
    ALL = await res.json();
    renderTable(ALL);
  } catch(e) {
    document.getElementById('prospect-body').innerHTML =
      '<tr><td colspan="7" style="padding:40px;text-align:center;color:#ef4444;">Failed to load prospects.</td></tr>';
  }
}
load();
</script>
{% endblock %}
