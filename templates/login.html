<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaximizerPro — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>*{font-family:'Inter',sans-serif;}</style>
</head>
<body style="min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#0f172a 100%);display:flex;align-items:center;justify-content:center;padding:20px;">

<!-- Animated background dots -->
<div style="position:fixed;inset:0;overflow:hidden;pointer-events:none;">
  <div style="position:absolute;top:20%;left:10%;width:300px;height:300px;background:rgba(245,158,11,.06);border-radius:50%;filter:blur(80px);"></div>
  <div style="position:absolute;bottom:20%;right:10%;width:400px;height:400px;background:rgba(245,158,11,.04);border-radius:50%;filter:blur:100px;"></div>
</div>

<div style="width:100%;max-width:420px;position:relative;">
  <!-- Logo -->
  <div style="text-align:center;margin-bottom:32px;">
    <div style="display:inline-flex;align-items:center;gap:14px;margin-bottom:12px;">
      <div style="width:52px;height:52px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(245,158,11,.4);">
        <span style="color:#fff;font-weight:900;font-size:26px;line-height:1;">T</span>
      </div>
      <div style="text-align:left;">
        <div style="color:#f8fafc;font-weight:900;font-size:24px;letter-spacing:-.5px;line-height:1.1;">TaximizerPro</div>
        <div style="color:#f59e0b;font-size:11px;font-weight:600;letter-spacing:2px;margin-top:2px;">WE MOVE MONEY. YOU MOVE ON.™</div>
      </div>
    </div>
    <div style="color:#64748b;font-size:13px;">Admin Portal — Authorized Access Only</div>
  </div>

  <!-- Card -->
  <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:32px;backdrop-filter:blur(20px);">
    {% if error %}
    <div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;display:flex;align-items:center;gap:8px;">
      ⚠️ {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div style="margin-bottom:18px;">
        <label style="display:block;color:#94a3b8;font-size:12px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">Email Address</label>
        <input type="email" name="email" required autofocus placeholder="admin@taximizerpro.com"
          style="width:100%;padding:12px 16px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;color:#f8fafc;font-size:13px;outline:none;transition:all .15s;box-sizing:border-box;"
          onfocus="this.style.borderColor='#f59e0b';this.style.boxShadow='0 0 0 3px rgba(245,158,11,.15)'"
          onblur="this.style.borderColor='rgba(255,255,255,.1)';this.style.boxShadow='none'">
      </div>
      <div style="margin-bottom:24px;">
        <label style="display:block;color:#94a3b8;font-size:12px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">Password</label>
        <input type="password" name="password" required placeholder="••••••••"
          style="width:100%;padding:12px 16px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;color:#f8fafc;font-size:13px;outline:none;transition:all .15s;box-sizing:border-box;"
          onfocus="this.style.borderColor='#f59e0b';this.style.boxShadow='0 0 0 3px rgba(245,158,11,.15)'"
          onblur="this.style.borderColor='rgba(255,255,255,.1)';this.style.boxShadow='none'">
      </div>
      <button type="submit"
        style="width:100%;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-weight:700;padding:13px;border-radius:10px;border:none;cursor:pointer;font-size:14px;letter-spacing:.3px;box-shadow:0 4px 16px rgba(245,158,11,.35);transition:all .2s;"
        onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 6px 20px rgba(245,158,11,.45)'"
        onmouseout="this.style.transform='';this.style.boxShadow='0 4px 16px rgba(245,158,11,.35)'">
        Sign In →
      </button>

      <!-- CAPTCHA -->
      <div id="captcha-box" style="margin-top:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:14px 16px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div id="captcha-check" style="width:22px;height:22px;border:2px solid rgba(255,255,255,.2);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="startCaptcha()">
            <span id="captcha-tick" style="display:none;color:#22c55e;font-size:14px;font-weight:900;">✓</span>
          </div>
          <div style="flex:1;">
            <div id="captcha-label" style="font-size:13px;color:rgba(255,255,255,.6);font-weight:600;">I'm not a robot</div>
            <div id="captcha-challenge" style="display:none;margin-top:8px;">
              <div id="captcha-question" style="font-size:13px;color:#60a5fa;font-weight:700;margin-bottom:6px;"></div>
              <div style="display:flex;gap:8px;align-items:center;">
                <input id="captcha-answer" type="number" placeholder="Answer" style="width:80px;padding:6px 10px;border:1.5px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.07);color:#f8fafc;font-size:13px;outline:none;">
                <button type="button" onclick="verifyCaptcha()" style="background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;">Check</button>
              </div>
              <div id="captcha-error" style="font-size:11px;color:#f87171;margin-top:4px;display:none;"></div>
            </div>
          </div>
          <div style="text-align:right;font-size:9px;color:rgba(255,255,255,.2);line-height:1.4;">
            <div style="font-size:16px;margin-bottom:2px;">🛡️</div>
            Secure
          </div>
        </div>
      </div>
      <input type="hidden" name="captcha_token" id="captcha_token_field">

    </form>

    <!-- Security badges -->
    <div style="display:flex;justify-content:center;gap:16px;margin-top:20px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,.3);">
        <span>🔒</span> SSL Encrypted
      </div>
      <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,.3);">
        <span>📱</span> 2FA Protected
      </div>
      <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,.3);">
        <span>🛡️</span> Rate Limited
      </div>
    </div>

    <div style="padding-top:16px;border-top:1px solid rgba(255,255,255,.06);text-align:center;color:#475569;font-size:11px;">
      TaximizerPro © 2026 · All rights reserved · Bisignano Holdings LLC
    </div>
  </div>
</div>

<script>
let captchaToken = null;

async function startCaptcha() {
  document.getElementById('captcha-label').textContent = 'Solve to verify';
  document.getElementById('captcha-challenge').style.display = 'block';
  try {
    const res = await fetch('/api/captcha/generate');
    const d = await res.json();
    captchaToken = d.token;
    document.getElementById('captcha-question').textContent = d.question;
    document.getElementById('captcha-answer').focus();
  } catch(e) {
    document.getElementById('captcha-label').textContent = 'Could not load CAPTCHA';
  }
}

async function verifyCaptcha() {
  const answer = document.getElementById('captcha-answer').value.trim();
  if (!answer) return;
  try {
    const res = await fetch('/api/captcha/verify', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({token: captchaToken, answer})
    });
    const d = await res.json();
    if (d.valid) {
      document.getElementById('captcha_token_field').value = d.pass_token;
      document.getElementById('captcha-challenge').style.display = 'none';
      document.getElementById('captcha-tick').style.display = 'block';
      document.getElementById('captcha-check').style.background = 'rgba(34,197,94,.15)';
      document.getElementById('captcha-check').style.borderColor = '#22c55e';
      document.getElementById('captcha-label').textContent = 'Verified ✓';
      document.getElementById('captcha-label').style.color = '#22c55e';
    } else {
      document.getElementById('captcha-error').textContent = 'Wrong answer — try again';
      document.getElementById('captcha-error').style.display = 'block';
      startCaptcha();
    }
  } catch(e) {}
}

// Allow Enter key in captcha answer
document.addEventListener('DOMContentLoaded', () => {
  const ans = document.getElementById('captcha-answer');
  if (ans) ans.addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();verifyCaptcha();}});
});
</script>

</body>
</html>
