<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaximizerPro — Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>*{font-family:'Inter',sans-serif;}</style>
</head>
<body style="min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#0f172a 100%);display:flex;align-items:center;justify-content:center;padding:20px;">

<!-- Animated background dots -->
<div style="position:fixed;inset:0;overflow:hidden;pointer-events:none;">
  <div style="position:absolute;top:20%;left:10%;width:300px;height:300px;background:rgba(245,158,11,.06);border-radius:50%;filter:blur(80px);"></div>
  <div style="position:absolute;bottom:20%;right:10%;width:400px;height:400px;background:rgba(245,158,11,.04);border-radius:50%;filter:blur:100px;"></div>
</div>

<div style="width:100%;max-width:420px;position:relative;">
  <!-- Logo -->
  <div style="text-align:center;margin-bottom:32px;">
    <div style="display:inline-flex;align-items:center;gap:14px;margin-bottom:12px;">
      <div style="width:52px;height:52px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(245,158,11,.4);">
        <span style="color:#fff;font-weight:900;font-size:26px;line-height:1;">T</span>
      </div>
      <div style="text-align:left;">
        <div style="color:#f8fafc;font-weight:900;font-size:24px;letter-spacing:-.5px;line-height:1.1;">TaximizerPro</div>
        <div style="color:#f59e0b;font-size:11px;font-weight:600;letter-spacing:2px;margin-top:2px;">WE MOVE MONEY. YOU MOVE ON.™</div>
      </div>
    </div>
    <div style="color:#64748b;font-size:13px;">Admin Portal — Authorized Access Only</div>
  </div>

  <!-- Card -->
  <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:32px;backdrop-filter:blur(20px);">
    {% if error %}
    <div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;display:flex;align-items:center;gap:8px;">
      ⚠️ {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div style="margin-bottom:18px;">
        <label style="display:block;color:#94a3b8;font-size:12px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">Email Address</label>
        <input type="email" name="email" required autofocus placeholder="admin@taximizerpro.com"
          style="width:100%;padding:12px 16px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;color:#f8fafc;font-size:13px;outline:none;transition:all .15s;box-sizing:border-box;"
          onfocus="this.style.borderColor='#f59e0b';this.style.boxShadow='0 0 0 3px rgba(245,158,11,.15)'"
          onblur="this.style.borderColor='rgba(255,255,255,.1)';this.style.boxShadow='none'">
      </div>
      <div style="margin-bottom:24px;">
        <label style="display:block;color:#94a3b8;font-size:12px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">Password</label>
        <input type="password" name="password" required placeholder="••••••••"
          style="width:100%;padding:12px 16px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;color:#f8fafc;font-size:13px;outline:none;transition:all .15s;box-sizing:border-box;"
          onfocus="this.style.borderColor='#f59e0b';this.style.boxShadow='0 0 0 3px rgba(245,158,11,.15)'"
          onblur="this.style.borderColor='rgba(255,255,255,.1)';this.style.boxShadow='none'">
      </div>
      <button type="submit"
        style="width:100%;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-weight:700;padding:13px;border-radius:10px;border:none;cursor:pointer;font-size:14px;letter-spacing:.3px;box-shadow:0 4px 16px rgba(245,158,11,.35);transition:all .2s;"
        onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 6px 20px rgba(245,158,11,.45)'"
        onmouseout="this.style.transform='';this.style.boxShadow='0 4px 16px rgba(245,158,11,.35)'">
        Sign In →
      </button>
      <div style="text-align:center;margin-top:16px;">
        <a href="/forgot-password" style="color:#64748b;font-size:12px;text-decoration:none;">Forgot your password?</a>
      </div>
    </form>

    <div style="margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06);text-align:center;">
      <p style="color:#475569;font-size:12px;margin:0 0 12px;">Don't have an account?</p>
      <a href="/request-account"
        style="display:inline-block;border:1.5px solid rgba(245,158,11,.4);color:#f59e0b;font-weight:600;padding:10px 24px;border-radius:10px;text-decoration:none;font-size:13px;transition:all .2s;"
        onmouseover="this.style.background='rgba(245,158,11,.08)'"
        onmouseout="this.style.background='transparent'">
        Request Access →
      </a>
    </div>

    <div style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.04);text-align:center;color:#475569;font-size:11px;">
      TaximizerPro © 2026 · All rights reserved
    </div>
  </div>
</div>
</body>
</html>
