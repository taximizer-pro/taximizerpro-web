{% extends "base.html" %}
{% block title %}Clients — TaximizerPro{% endblock %}
{% block content %}
<div style="padding:28px 32px;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
    <div>
      <h1 style="font-size:22px;font-weight:800;color:#0f172a;margin:0;">Clients</h1>
      <p style="color:#64748b;font-size:13px;margin-top:4px;">Manage records, generate forms, track status.</p>
    </div>
    <a href="/new-client" class="btn-primary" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;">
      <svg style="width:15px;height:15px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Add Client
    </a>
  </div>

  <!-- Search bar -->
  <div class="card" style="padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:16px;">
    <svg style="width:16px;height:16px;color:#94a3b8;flex-shrink:0;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <input type="text" id="search" placeholder="Search by name, email, or SSN..." style="flex:1;outline:none;font-size:13px;color:#1e293b;background:transparent;border:none;">
    <select id="status-filter" style="font-size:12px;color:#64748b;outline:none;border:none;background:transparent;border-left:1px solid #f1f5f9;padding-left:12px;">
      <option value="">All Status</option>
      <option value="pending">Pending</option>
      <option value="filed">Filed</option>
    </select>
  </div>

  <!-- Table -->
  <div class="card">
    <table style="width:100%;border-collapse:collapse;">
      <thead>
        <tr style="background:#f8fafc;border-bottom:1px solid #f1f5f9;">
          <th style="padding:12px 18px;text-align:left;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">Client</th>
          <th style="padding:12px 18px;text-align:left;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">SSN</th>
          <th style="padding:12px 18px;text-align:left;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">Tax Years</th>
          <th style="padding:12px 18px;text-align:left;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">Status</th>
          <th style="padding:12px 18px;text-align:left;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">Refund</th>
          <th style="padding:12px 18px;text-align:right;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;">Action</th>
        </tr>
      </thead>
      <tbody id="clients-tbody">
        <tr><td colspan="6" style="padding:40px;text-align:center;color:#94a3b8;font-size:13px;">Loading clients...</td></tr>
      </tbody>
    </table>
    <div style="padding:12px 18px;border-top:1px solid #f8fafc;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:12px;color:#94a3b8;" id="count-label">—</span>
      <div style="display:flex;gap:8px;">
        <button onclick="changePage(-1)" id="prev-btn" style="font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid #e2e8f0;color:#64748b;background:#fff;cursor:pointer;">← Prev</button>
        <button onclick="changePage(1)"  id="next-btn" style="font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid #e2e8f0;color:#64748b;background:#fff;cursor:pointer;">Next →</button>
      </div>
    </div>
  </div>
</div>

<!-- Generate Modal -->
<div id="gen-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:50;">
  <div style="background:#fff;border-radius:20px;padding:28px;max-width:460px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);">
    <div style="font-size:16px;font-weight:800;color:#0f172a;margin-bottom:4px;">Generate 1040 Forms</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:16px;" id="gen-name">—</div>
    <div id="gen-progress" style="background:#f8fafc;border-radius:10px;padding:16px;font-size:12px;color:#475569;min-height:80px;font-family:monospace;white-space:pre-wrap;border:1px solid #f1f5f9;">Initializing...</div>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button onclick="closeModal()" style="flex:1;padding:10px;border-radius:10px;border:1px solid #e2e8f0;color:#64748b;font-size:13px;cursor:pointer;background:#fff;">Close</button>
    </div>
  </div>
</div>

<script>
let all = [], page = 0, per = 25, sq = "", stq = "";

function render(){
  let f = all.filter(c=>{
    const q = sq.toLowerCase();
    return ((!q)||(c.full_name||"").toLowerCase().includes(q)||(c.email||"").toLowerCase().includes(q)||(c.ssn||"").includes(q))
        && ((!stq)||(c.filing_status||"pending")===stq);
  });
  const tot = f.length, start = page*per, sl = f.slice(start, start+per);
  document.getElementById("count-label").textContent = `${Math.min(start+1,tot)}–${Math.min(start+per,tot)} of ${tot} clients`;
  document.getElementById("prev-btn").disabled = page===0;
  document.getElementById("next-btn").disabled = start+per>=tot;
  const tb = document.getElementById("clients-tbody");
  if(!sl.length){tb.innerHTML='<tr><td colspan="6" style="padding:40px;text-align:center;color:#94a3b8;font-size:13px;">No clients found</td></tr>';return;}
  tb.innerHTML = sl.map(c=>{
    const name = c.full_name||((c.first_name||"")+" "+(c.last_name||"")).trim();
    const ssn = (c.ssn||"").length>=4?"***-**-"+(c.ssn||"").slice(-4):(c.ssn||"—");
    const status = c.filing_status||"pending";
    const refund = c.refund_amount?("$"+parseFloat(c.refund_amount).toLocaleString()):"—";
    return `<tr style="border-bottom:1px solid #f8fafc;" onmouseover="this.style.background='#fafafa'" onmouseout="this.style.background=''">
      <td style="padding:12px 18px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#fef3c7,#fde68a);display:flex;align-items:center;justify-content:center;color:#92400e;font-weight:700;font-size:13px;flex-shrink:0;">${(c.first_name||"?")[0]}</div>
          <div>
            <div style="font-size:13px;font-weight:600;color:#1e293b;">${name}</div>
            <div style="font-size:11px;color:#94a3b8;">${c.email||""}</div>
          </div>
        </div>
      </td>
      <td style="padding:12px 18px;font-family:monospace;font-size:12px;color:#64748b;">${ssn}</td>
      <td style="padding:12px 18px;"><span style="background:#f1f5f9;color:#475569;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;">${c.tax_year||"—"}</span></td>
      <td style="padding:12px 18px;"><span class="${status==="filed"?"badge-filed":"badge-pending"}">${status}</span></td>
      <td style="padding:12px 18px;font-size:13px;font-weight:600;color:#1e293b;">${refund}</td>
      <td style="padding:12px 18px;text-align:right;">
        <button onclick='genForms(${JSON.stringify(c)})' class="btn-primary" style="padding:7px 14px;font-size:12px;">Generate →</button>
      </td>
    </tr>`;
  }).join("");
}

function changePage(d){page=Math.max(0,page+d);render();}
document.getElementById("search").addEventListener("input",e=>{sq=e.target.value;page=0;render();});
document.getElementById("status-filter").addEventListener("change",e=>{stq=e.target.value;page=0;render();});

fetch("/api/clients").then(r=>r.json()).then(data=>{all=data;render();}).catch(()=>{
  document.getElementById("clients-tbody").innerHTML='<tr><td colspan="6" style="padding:40px;text-align:center;color:#ef4444;font-size:13px;">Failed to load. Check connection.</td></tr>';
});

function genForms(c){
  const modal = document.getElementById("gen-modal");
  modal.style.display="flex";
  document.getElementById("gen-name").textContent = (c.full_name||(c.first_name+" "+c.last_name))+" · "+( c.tax_year||"");
  document.getElementById("gen-progress").textContent = "⏳ Connecting to Drive and filling forms...";
  fetch("/api/generate/"+c.id,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({client:c})})
    .then(r=>r.json()).then(d=>{
      if(d.success){
        let out="✅ Forms generated successfully!\n\n";
        for(const[yr,url] of Object.entries(d.links||{})) out+=`📄 ${yr}: ${url}\n`;
        document.getElementById("gen-progress").textContent=out;
      } else {
        document.getElementById("gen-progress").textContent="❌ Error: "+(d.error||"Unknown");
      }
    }).catch(e=>{document.getElementById("gen-progress").textContent="❌ Failed: "+e;});
}
function closeModal(){document.getElementById("gen-modal").style.display="none";}
</script>
{% endblock %}
