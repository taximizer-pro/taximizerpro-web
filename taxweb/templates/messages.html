{% extends "base.html" %}
{% block title %}Messages — TaximizerPro{% endblock %}
{% block content %}
<div style="display:flex;height:calc(100vh - 0px);">
  <!-- Client list -->
  <div style="width:260px;background:#fff;border-right:1px solid #f1f5f9;display:flex;flex-direction:column;flex-shrink:0;">
    <div style="padding:18px 16px;border-bottom:1px solid #f1f5f9;">
      <div style="font-size:14px;font-weight:700;color:#0f172a;margin-bottom:10px;">Messages</div>
      <input type="text" id="search" placeholder="Search clients..." style="width:100%;padding:8px 12px;background:#f8fafc;border:1px solid #f1f5f9;border-radius:8px;font-size:12px;color:#1e293b;outline:none;box-sizing:border-box;">
    </div>
    <div id="thread-list" style="flex:1;overflow-y:auto;"></div>
  </div>

  <!-- Chat -->
  <div style="flex:1;display:flex;flex-direction:column;background:#f8fafc;">
    <div style="background:#fff;border-bottom:1px solid #f1f5f9;padding:16px 20px;display:flex;align-items:center;gap:12px;">
      <div id="chat-avatar" style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#fef3c7,#fde68a);display:flex;align-items:center;justify-content:center;color:#92400e;font-weight:700;font-size:15px;flex-shrink:0;">—</div>
      <div>
        <div id="chat-name" style="font-size:14px;font-weight:700;color:#0f172a;">Select a client</div>
        <div id="chat-email" style="font-size:11px;color:#94a3b8;">to start messaging</div>
      </div>
    </div>
    <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;">
      <div style="text-align:center;color:#cbd5e1;font-size:13px;margin-top:60px;">Select a client to view messages</div>
    </div>
    <div style="background:#fff;border-top:1px solid #f1f5f9;padding:14px 16px;display:flex;gap:10px;">
      <input id="msg-input" type="text" disabled placeholder="Type a message..."
        style="flex:1;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;color:#1e293b;outline:none;transition:all .15s;"
        onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#e2e8f0'"
        onkeydown="if(event.key==='Enter')sendMsg()">
      <button id="send-btn" onclick="sendMsg()" disabled class="btn-primary">Send</button>
    </div>
  </div>
</div>

<script>
let clients=[], sel=null, threads={};

fetch("/api/clients").then(r=>r.json()).then(d=>{clients=d;renderList(d);}).catch(()=>{});

function renderList(list){
  const box=document.getElementById("thread-list");
  if(!list.length){box.innerHTML='<div style="padding:20px;text-align:center;color:#94a3b8;font-size:12px;">No clients</div>';return;}
  box.innerHTML=list.map(c=>`
    <div onclick='pick(${JSON.stringify(c)})' style="padding:12px 16px;border-bottom:1px solid #f8fafc;cursor:pointer;transition:all .15s;" onmouseover="this.style.background='#fef3c7'" onmouseout="this.style.background=''">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#fef3c7,#fde68a);display:flex;align-items:center;justify-content:center;color:#92400e;font-weight:700;font-size:12px;flex-shrink:0;">${(c.first_name||"?")[0]}</div>
        <div style="min-width:0;">
          <div style="font-size:12px;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.full_name||((c.first_name||"")+" "+(c.last_name||"")).trim()}</div>
          <div style="font-size:10px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.email||""}</div>
        </div>
      </div>
    </div>`).join("");
}

document.getElementById("search").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase();
  renderList(clients.filter(c=>(c.full_name||"").toLowerCase().includes(q)||(c.email||"").toLowerCase().includes(q)));
});

function pick(c){
  sel=c;
  document.getElementById("chat-avatar").textContent=(c.first_name||"?")[0];
  document.getElementById("chat-name").textContent=c.full_name||((c.first_name||"")+" "+(c.last_name||"")).trim();
  document.getElementById("chat-email").textContent=c.email||"";
  document.getElementById("msg-input").disabled=false;
  document.getElementById("send-btn").disabled=false;
  renderMsgs(c.id);
}

function renderMsgs(cid){
  const box=document.getElementById("chat-msgs");
  const msgs=threads[cid]||[];
  if(!msgs.length){box.innerHTML='<div style="text-align:center;color:#cbd5e1;font-size:12px;margin-top:40px;">No messages yet. Say hello!</div>';return;}
  box.innerHTML=msgs.map(m=>`
    <div style="display:flex;justify-content:${m.from==="admin"?"flex-end":"flex-start"};">
      <div style="max-width:65%;padding:10px 14px;border-radius:${m.from==="admin"?"16px 16px 4px 16px":"16px 16px 16px 4px"};font-size:13px;background:${m.from==="admin"?"linear-gradient(135deg,#f59e0b,#d97706)":"#fff"};color:${m.from==="admin"?"#fff":"#1e293b"};box-shadow:0 1px 4px rgba(0,0,0,.08);">
        ${m.text}
        <div style="font-size:10px;color:${m.from==="admin"?"rgba(255,255,255,.6)":"#94a3b8"};margin-top:4px;">${m.time}</div>
      </div>
    </div>`).join("");
  box.scrollTop=box.scrollHeight;
}

function sendMsg(){
  const inp=document.getElementById("msg-input");
  const txt=inp.value.trim();
  if(!txt||!sel)return;
  if(!threads[sel.id])threads[sel.id]=[];
  threads[sel.id].push({from:"admin",text:txt,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})});
  inp.value="";
  renderMsgs(sel.id);
}
</script>
{% endblock %}
